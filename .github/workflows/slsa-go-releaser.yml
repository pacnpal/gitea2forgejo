# SLSA3-compliant Go release workflow for 6 target platforms.
# Produces signed provenance attestations verifiable via slsa-verifier.
# See https://slsa.dev and https://github.com/slsa-framework/slsa-github-generator.

name: SLSA Go releaser
on:
  workflow_dispatch:
  release:
    types: [created]

permissions: read-all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,   arch: amd64 }
          - { os: linux,   arch: arm64 }
          - { os: darwin,  arch: amd64 }
          - { os: darwin,  arch: arm64 }
          - { os: windows, arch: amd64 }
          - { os: windows, arch: arm64 }
    name: build (${{ matrix.os }}/${{ matrix.arch }})
    permissions:
      id-token: write # To sign provenance.
      contents: write # To upload release assets.
      actions: read   # To read workflow path for provenance.
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_go_slsa3.yml@v2.1.0
    with:
      go-version: "1.26"
      config-file: .slsa-goreleaser-${{ matrix.os }}-${{ matrix.arch }}.yml
      upload-assets: true
      # Pass VERSION + COMMIT as trusted, evaluated env vars so the config's
      # ldflags can reference them as {{ .Env.VERSION }} / {{ .Env.COMMIT }}.
      evaluated-envs: "VERSION:${{ github.ref_name }}, COMMIT:${{ github.sha }}"
